<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DiVISE OS</title>

<style>
body {
    margin: 0;
    background: #050508;
    color: #dcdcff;
    font-family: "Courier New", monospace;
    overflow: hidden;
}

/* Boot screen */
#boot {
    position: fixed;
    width: 100%;
    height: 100%;
    background: black;
    color: #00ffcc;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    z-index: 9999;
}

.progress {
    width: 300px;
    height: 10px;
    border: 1px solid #00ffcc;
    margin-top: 20px;
}

.bar {
    height: 100%;
    width: 0%;
    background: #00ffcc;
}

/* Desktop */
#desktop {
    display: none;
    width: 100vw;
    height: 100vh;
    background: radial-gradient(circle at center, #0b0b18, #000);
    position: relative;
}

/* Icons */
.icon {
    position: absolute;
    text-align: center;
    cursor: pointer;
}

.icon img {
    width: 48px;
}

/* Windows */
.window {
    position: absolute;
    top: 100px;
    left: 100px;
    width: 400px;
    background: #111;
    border: 2px solid #666;
    border-radius: 8px;
    display: none;
}

.title-bar {
    background: linear-gradient(to right, #2a2a40, #5a2eff);
    padding: 5px;
    color: white;
    cursor: move;
}

.content {
    padding: 15px;
}

.hero img {
    width: 100%;
    image-rendering: pixelated;
}

/* Crash screen */
#crash {
    display: none;
    position: fixed;
    width: 100%;
    height: 100%;
    background: #0000aa;
    color: white;
    z-index: 99999;
    padding: 50px;
}

/* Player */
.player {
    text-align: center;
}
</style>
</head>

<body>

<div id="boot">
<h1>Booting DiVISE OS...</h1>
<div class="progress"><div class="bar" id="bar"></div></div>
</div>

<div id="desktop">

<div class="icon" style="top:50px; left:50px;" onclick="openWindow('home')">
<img src="https://cdn-icons-png.flaticon.com/512/1828/1828919.png">
<div>DiVISE</div>
</div>

<div class="icon" style="top:50px; left:150px;" onclick="openWindow('releases')">
<img src="https://cdn-icons-png.flaticon.com/512/727/727245.png">
<div>Releases</div>
</div>

<div class="icon" style="top:50px; left:250px;" onclick="openWindow('mail')">
<img src="https://cdn-icons-png.flaticon.com/512/561/561127.png">
<div>Email</div>
</div>

</div>

<!-- Windows -->
<div id="home" class="window">
<div class="title-bar">DiVISE.app</div>
<div class="content hero">
<img src="DMS_Logo_v1.png">
<p>Welcome to DiVISE OS</p>
</div>
</div>

<div id="releases" class="window">
<div class="title-bar">Releases.app</div>
<div class="content">
<p>Loading...</p>
</div>
</div>

<div id="mail" class="window">
<div class="title-bar">Mail.app</div>
<div class="content">
<form action="mailto:info@divisemusicsolutions.com">
<input type="text" value="info@divisemusicsolutions.com"><br>
<input type="text" placeholder="Subject"><br>
<textarea placeholder="Message"></textarea><br>
<button>Send</button>
</form>
</div>
</div>

<!-- Crash screen -->
<div id="crash">
<h1>System Error</h1>
<p>Too much groove detected.</p>
<p>Press refresh to restart DiVISE OS.</p>
</div>

<script>
// boot animation
let width = 0;
let interval = setInterval(()=>{
    width += 5;
    document.getElementById("bar").style.width = width + "%";
    if(width >= 100){
        clearInterval(interval);
        document.getElementById("boot").style.display = "none";
        document.getElementById("desktop").style.display = "block";
    }
}, 100);

// open window
function openWindow(id){
    document.getElementById(id).style.display = "block";
}

// random crash
setTimeout(()=>{
    if(Math.random() > 0.7){
        document.getElementById("crash").style.display = "block";
    }
}, 10000);
</script>

</body>
</html>
