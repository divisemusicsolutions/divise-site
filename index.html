<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DiVISE OS</title>

<style>
body {
    margin: 0;
    font-family: monospace;
    background: black;
    overflow: hidden;
    color: white;
}

/* Background logo */
#bg {
    position: fixed;
    width: 100%;
    height: 100%;
    background: url('DMS_Logo_v1.png') center/contain no-repeat;
    opacity: 0.08;
    z-index: 0;
}

/* Desktop */
#desktop {
    position: relative;
    width: 100vw;
    height: 100vh;
    z-index: 1;
}

/* Icons */
.icon {
    position: absolute;
    text-align: center;
    cursor: pointer;
    color: #ccc;
}

.icon:hover {
    color: white;
}

/* Windows */
.window {
    position: absolute;
    top: 120px;
    left: 120px;
    width: 420px;
    background: #111;
    border: 2px solid #444;
    border-radius: 10px;
    display: none;
    z-index: 10;
}

.title-bar {
    background: linear-gradient(to right, #2a2a40, #6c3cff);
    padding: 6px;
    cursor: move;
    display: flex;
    justify-content: space-between;
}

.close-btn {
    cursor: pointer;
    color: red;
}

.content {
    padding: 15px;
}

.hero img {
    width: 100%;
    image-rendering: pixelated;
}

/* Boot screen */
#boot {
    position: fixed;
    width: 100%;
    height: 100%;
    background: black;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    z-index: 999;
}

.bar {
    width: 0%;
    height: 10px;
    background: #6c3cff;
}

/* Crash */
#crash {
    display: none;
    position: fixed;
    width: 100%;
    height: 100%;
    background: #0000aa;
    color: white;
    z-index: 9999;
    padding: 40px;
}
</style>
</head>

<body>

<div id="boot">
<h1>Booting DiVISE OS...</h1>
<div style="width:300px;border:1px solid white;">
<div id="bar" class="bar"></div>
</div>
</div>

<div id="bg"></div>

<div id="desktop">

<div class="icon" style="top:40px;left:40px;" onclick="openWindow('home')">💿<br>DiVISE</div>
<div class="icon" style="top:40px;left:120px;" onclick="openWindow('releases')">🎵<br>Releases</div>
<div class="icon" style="top:40px;left:200px;" onclick="openWindow('mail')">📧<br>Email</div>

</div>

<!-- Windows -->
<div id="home" class="window">
<div class="title-bar">DiVISE.app <span class="close-btn" onclick="closeWin('home')">✖</span></div>
<div class="content hero">
<img src="DMS_Logo_v1.png">
<p>Welcome to DiVISE OS</p>
</div>
</div>

<div id="releases" class="window">
<div class="title-bar">Releases.app <span class="close-btn" onclick="closeWin('releases')">✖</span></div>
<div class="content">
<p>Loading...</p>
</div>
</div>

<div id="mail" class="window">
<div class="title-bar">Mail.app <span class="close-btn" onclick="closeWin('mail')">✖</span></div>
<div class="content">
<form action="mailto:info@divisemusicsolutions.com">
<input type="text" value="info@divisemusicsolutions.com"><br><br>
<input type="text" placeholder="Subject"><br><br>
<textarea placeholder="Message"></textarea><br><br>
<button>Send</button>
</form>
</div>
</div>

<div id="crash">
<h1>System Error</h1>
<p>Too much groove detected.</p>
<p>Refresh to reboot.</p>
</div>

<script>
// boot
let w=0;
let i=setInterval(()=>{
w+=5;
document.getElementById("bar").style.width=w+"%";
if(w>=100){
clearInterval(i);
document.getElementById("boot").style.display="none";
}
},80);

// window logic
let z=20;

function openWindow(id){
let el=document.getElementById(id);
el.style.display="block";
z++;
el.style.zIndex=z;
}

function closeWin(id){
document.getElementById(id).style.display="none";
}

// random crash
setTimeout(()=>{
if(Math.random()>0.75){
document.getElementById("crash").style.display="block";
}
},12000);

// drag windows
document.querySelectorAll(".window").forEach(win=>{
let bar=win.querySelector(".title-bar");
let offsetX, offsetY, dragging=false;

bar.onmousedown=(e)=>{
dragging=true;
offsetX=e.clientX-win.offsetLeft;
offsetY=e.clientY-win.offsetTop;
win.style.zIndex=++z;
};

document.onmouseup=()=>dragging=false;

document.onmousemove=(e)=>{
if(dragging){
win.style.left=(e.clientX-offsetX)+"px";
win.style.top=(e.clientY-offsetY)+"px";
}
};
});
</script>

</body>
</html>
